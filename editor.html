<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Markdown text editor — offline, private, fast.">
  <title>Writer — orOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">

  <script>
    (function(){
      var t = localStorage.getItem('oros-theme');
      if(!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- Global Header -->
  <div id="oros-header"></div>
  <script src="assets/js/components/header.js"></script>

  <!-- App: full-width, centered -->
  <main class="app-main">
    <div class="app-container">
      <div class="toolbar">
        <button id="btn-new" class="btn-control" data-i18n="button_new">New</button>
        <button id="btn-save" class="btn-control" data-i18n="button_save">Save</button>
        <button id="btn-load" class="btn-control" data-i18n="button_load">Load</button>
        <button id="btn-clear" class="btn-control" data-i18n="button_clear">Clear</button>
        <button id="btn-export-md" class="btn-control" data-i18n="button_export_md">Export MD</button>
        <button id="btn-copy-html" class="btn-control" data-i18n="button_copy_html">Copy HTML</button>
        <span id="save-status" style="color:var(--accent);font-size:0.85rem;margin-left:auto;font-weight:600;"></span>
      </div>
      
      <div class="editor-wrapper">
        <textarea 
          id="editor" 
          class="editor-input" 
          data-i18n-placeholder="placeholder_editor"
          placeholder="Start writing here... Supports Markdown syntax."
        ></textarea>
      </div>
    </div>
  </main>

  <!-- Global Footer + Back-to-top -->
  <div id="oros-footer"></div>
  <script src="assets/js/components/footer.js"></script>

  <!-- Core + Editor -->
  <script src="assets/js/main.js"></script>
  <script src="assets/js/editor.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
