<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Text editor — offline, private, fast.">
  <title>Writer — orOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">

  <script>
    (function(){
      var t = localStorage.getItem('oros-theme');
      if(!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <div id="oros-header"></div>
  <script src="assets/js/components/header.js"></script>

  <main class="app-main" id="editor-container">

    <!-- Find & Replace Bar (hidden by default) -->
    <div class="find-replace-bar" id="find-replace-bar" style="display:none;">
      <input type="text" class="find-input" id="find-find" data-i18n-placeholder="fr_find_placeholder" placeholder="Find...">
      <input type="text" class="find-input" id="find-replace" data-i18n-placeholder="fr_replace_placeholder" placeholder="Replace with...">
      <div class="fr-buttons">
        <button class="fr-btn" id="btn-find-prev" data-i18n="fr_prev_btn">Prev</button>
        <button class="fr-btn" id="btn-find-next" data-i18n="fr_next_btn">Next</button>
        <button class="fr-btn" id="btn-replace" data-i18n="fr_replace_btn">Replace</button>
        <button class="fr-btn" id="btn-replace-all" data-i18n="fr_replace_all_btn">All</button>
        <button class="close-fr-btn" id="btn-close-fr">&times;</button>
      </div>
      <span class="fr-results" id="fr_results">0 matches</span>
    </div>

    <div class="toolbar">
      <div class="export-wrap">
        <button id="btn-export" class="btn-control" data-i18n="button_export">Export &#9662;</button>
         <div class="export-dropdown" id="export-dropdown">
          <button data-format="md" data-i18n="export_md">MD</button>
          <button data-format="txt" data-i18n="export_txt">TXT</button>
          <button data-format="rtf" data-i18n="export_rtf">RTF</button>
          <button data-format="doc" data-i18n="export_doc">DOC</button>
          <button data-format="pdf" data-i18n="export_pdf">PDF</button>
        </div>
      </div>

      <button id="btn-open" class="btn-control" data-i18n="button_open" data-i18n-tooltip="open_hint" title="">Open</button>
      <button id="btn-clear" class="btn-control" data-i18n="button_clear">Clear</button>

      <!-- Quick Format Toolbar (centered) -->
      <div class="quick-format-toolbar" id="quick-format-toolbar">
        <button type="button" class="fmt-btn" data-cmd="bold" data-title-b="bold_title" data-i18n-tooltip="bold_title" title="Bold (Ctrl+B)">B</button>
        <button type="button" class="fmt-btn" data-cmd="italic" data-title-b="italic_title" data-i18n-tooltip="italic_title" title="Italic (Ctrl+I)">I</button>
        <button type="button" class="fmt-btn" data-cmd="underline" data-title-b="underline_title" data-i18n-tooltip="underline_title" title="Underline (Ctrl+U)">U</button>
        <button type="button" class="fmt-btn" data-cmd="strikeThrough" data-title-b="strike_title" data-i18n-tooltip="strike_title" title="Strikethrough">S</button>
        <button type="button" class="fmt-btn" data-cmd="insertUnorderedList" data-title-b="ulist_title" data-i18n-tooltip="ulist_title" title="Bullet List">•</button>
        <button type="button" class="fmt-btn" data-cmd="insertOrderedList" data-title-b="olist_title" data-i18n-tooltip="olist_title" title="Numbered List">1.</button>
      </div>

      <span id="save-status" style="color:var(--accent);font-size:0.85rem;font-weight:600;margin-left:auto;"></span>
    </div>

    <div class="editor-wrapper" id="rich-wrapper">
      <div
        id="rich-editor"
        class="rich-editor"
        contenteditable="true"
        data-i18n-placeholder="placeholder_rich"
        data-placeholder="Start writing here..."
        spellcheck="true"
      ></div>

      <!-- Stats overlay (optional toggle) -->
      <div class="stats-overlay" id="stats-overlay">
        <span id="word_count">0</span> <span data-i18n="words_label">words</span>
        <span class="stat-sep">&middot;</span>
        <span id="char_count">0</span> <span data-i18n="chars_label">chars</span>
        <span class="stat-sep">&middot;</span>
        <span id="read_time">0m</span> <span data-i18n="read_label">read</span>
      </div>
    </div>
  </main>

  <div id="oros-footer"></div>
  <script src="assets/js/components/footer.js"></script>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/editor.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
