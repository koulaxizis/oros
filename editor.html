<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="orOS Writer — Privacy-first, offline text editor for writers, bloggers, and journalists.">
  <title>orOS Writer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <script>
    (function(){
      var t = localStorage.getItem('oros-theme');
      if(!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo">
        <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 80 L35 30 L50 55 L65 20 L90 80 Z" fill="#c8a96e" opacity="0.85"/>
          <circle cx="72" cy="22" r="8" fill="#c8a96e" opacity="0.6"/>
        </svg>
        <span class="logo-text"><b>or</b><i>OS</i><span class="version-badge">v0.4</span></span>
      </a>
      <div class="header-controls">
        <select class="lang-select" id="lang-select">
          <option value="en">EN</option>
          <option value="el">EL</option>
          <option value="es">ES</option>
          <option value="it">IT</option>
          <option value="fr">FR</option>
          <option value="de">DE</option>
        </select>
        <button class="btn-control btn-icon" id="theme-toggle" title="Theme">🌓</button>
        <button class="btn-control btn-icon" id="btn-settings" title="Settings">⚙️</button>
        <button class="btn-control btn-icon" id="btn-zencenter" title="Zen Mode">🏔</button>
      </div>
    </div>
  </header>

  <!-- Main App -->
  <main class="app-main">
    <!-- Find & Replace Bar -->
    <div class="find-replace-bar" id="find-replace-bar" style="display:none;">
      <input class="find-input" id="find-find" type="text" placeholder="Find" />
      <input class="find-input" id="find-replace" type="text" placeholder="Replace" />
      <div class="fr-buttons">
        <button class="fr-btn" id="btn-find-prev">↑</button>
        <button class="fr-btn" id="btn-find-next">↓</button>
        <button class="fr-btn" id="btn-replace">↕</button>
        <button class="fr-btn" id="btn-replace-all">⇄</button>
      </div>
      <span class="fr-results" id="fr_results">0 matches</span>
      <button class="close-fr-btn" id="btn-close-fr">×</button>
    </div>

    <!-- Goal Bar -->
    <div class="goal-bar" id="goal-bar" style="display:none;">
      <select class="goal-unit" id="goal-unit">
        <option value="words">Words</option>
        <option value="chars">Chars</option>
        <option value="paras">Paras</option>
      </select>
      <input class="goal-input" id="goal-target-input" type="number" min="1" placeholder="0" />
      <label class="goal-lock-label">
        <input type="checkbox" id="goal-lock" /> Lock
      </label>
      <div class="fr-buttons">
        <button class="fr-btn" id="btn-set-goal">✓</button>
        <button class="fr-btn" id="btn-clear-goal">✕</button>
      </div>
      <button class="close-fr-btn" id="btn-close-goal">×</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="btn-control" id="btn-open">📁</button>
      <button class="btn-control" id="btn-clear">🗑</button>
      <div class="export-wrap">
        <button class="btn-control" id="btn-export">💾 ↓</button>
        <div class="export-dropdown" id="export-dropdown">
          <button data-format="md">Markdown (.md)</button>
          <button data-format="txt">Plain Text (.txt)</button>
          <button data-format="rtf">Rich Text (.rtf)</button>
          <button data-format="pdf">PDF (.pdf)</button>
          <button data-format="doc">Word (.doc)</button>
        </div>
      </div>
      <div class="quick-format-toolbar" id="quick-format-toolbar">
        <button class="fmt-btn" data-cmd="bold" title="Bold (Ctrl+B)">B</button>
        <button class="fmt-btn" data-cmd="italic" title="Italic (Ctrl+I)">I</button>
        <button class="fmt-btn" data-cmd="underline" title="Underline (Ctrl+U)">U</button>
        <button class="fmt-btn" data-cmd="strikeThrough" title="Strikethrough">S</button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-block="H1" title="Heading 1">H1</button>
        <button class="fmt-btn" data-block="H2" title="Heading 2">H2</button>
        <button class="fmt-btn" data-block="H3" title="Heading 3">H3</button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-cmd="insertUnorderedList" title="Bullet List">•</button>
        <button class="fmt-btn" data-cmd="insertOrderedList" title="Numbered List">1.</button>
      </div>
      <button class="btn-control btn-icon" id="btn-outline" title="Contents (📋)">📋</button>
      <button class="btn-control btn-icon" id="btn-metadata" title="Document Info (📘)">📘</button>
      <button class="btn-control btn-icon" id="btn-goal" title="Goal (Ctrl+G)">🎯</button>
      <button class="btn-control btn-icon" id="btn-find" title="Find (Ctrl+F)">🔍</button>
    </div>

    <!-- Editor Wrapper -->
    <div class="editor-wrapper" id="rich-wrapper">
      <div class="reading-progress-bar" id="reading-progress-bar"></div>
      <div class="outline-panel" id="outline-panel" style="display:none;">
        <div class="outline-header">
          <span id="outline-title-text">Contents</span>
          <button class="close-outline-btn" id="btn-close-outline">×</button>
        </div>
        <div class="outline-list" id="outline-list"></div>
      </div>
      <div class="metadata-panel" id="metadata-panel" style="display:none;">
        <div class="metadata-header">
          <span id="metadata-title-text">Document Info</span>
          <button class="close-metadata-btn" id="btn-close-metadata">×</button>
        </div>
        <div class="metadata-body">
          <label class="meta-field-label" for="meta-title">Title</label>
          <input class="meta-field-input" id="meta-title" type="text" placeholder="Document title" />
          <label class="meta-field-label" for="meta-author">Author</label>
          <input class="meta-field-input" id="meta-author" type="text" placeholder="Author name" />
          <label class="meta-field-label" for="meta-tags">Tags (comma separated)</label>
          <input class="meta-field-input" id="meta-tags" type="text" placeholder="tag1, tag2, tag3" />
          <label class="meta-field-label" for="meta-category">Category / Topic</label>
          <input class="meta-field-input" id="meta-category" type="text" placeholder="Article, Essay, Report..." />
          <div class="meta-dates">
            <span id="meta-created">Created: —</span>
            <span id="meta-modified">Modified: —</span>
          </div>
        </div>
      </div>
      <div class="rich-editor" id="rich-editor" contenteditable="true" spellcheck="false" data-placeholder="Start writing here..."></div>
      <div class="stats-overlay" id="stats-overlay">
        <span id="stats-default">0 words · 0 chars</span>
        <span id="stats-goal" style="display:none;"></span>
      </div>
    </div>
  </main>

  <!-- Global Footer (from footer.js component) -->
  <div id="oros-footer"></div>

  <!-- Toast -->
  <div class="zentool-toast" id="zen-toast" style="display:none;"></div>

  <!-- Scripts at end of body for DOM readiness -->
  <script src="assets/js/editor.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/components/footer.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
