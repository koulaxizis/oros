<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Text editor — offline, private, fast.">
  <title>Writer — orOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">

  <script>
    (function(){
      var t = localStorage.getItem('oros-theme');
      if(!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- Global Header (includes Zen, Settings, Theme, Language) -->
  <div id="oros-header"></div>
  <script src="assets/js/components/header.js"></script>

  <!-- App Content -->
  <main class="app-main">
    <div class="toolbar">
      <button id="btn-open" class="btn-control" data-i18n="button_open">Open</button>
      <button id="btn-clear" class="btn-control" data-i18n="button_clear">Clear</button>

      <div class="export-wrap">
        <button id="btn-export" class="btn-control" data-i18n="button_export">Export ▾</button>
        <div class="export-dropdown" id="export-dropdown">
          <button data-format="txt" data-i18n="export_txt">TXT</button>
          <button data-format="md" data-i18n="export_md">Markdown</button>
          <button data-format="docx" data-i18n="export_docx">DOCX</button>
          <button data-format="pdf" data-i18n="export_pdf">PDF</button>
        </div>
      </div>

      <div class="mode-toggle">
        <button id="mode-md" class="active">MD</button>
        <button id="mode-rich">Rich</button>
      </div>

      <span id="save-status" style="color:var(--accent);font-size:0.85rem;font-weight:600;"></span>
    </div>

    <!-- Markdown mode -->
    <div class="editor-wrapper" id="md-wrapper">
      <textarea
        id="editor"
        class="editor-input"
        data-i18n-placeholder="placeholder_editor"
        placeholder="Start writing here... Supports Markdown syntax."
      ></textarea>
    </div>

    <!-- Rich text mode -->
    <div class="editor-wrapper" id="rich-wrapper" style="display:none;">
      <div
        id="rich-editor"
        class="rich-editor"
        contenteditable="true"
        data-i18n-placeholder="placeholder_editor"
        data-placeholder="Start writing here..."
      ></div>
    </div>
  </main>

  <!-- Global Footer + Back-to-top -->
  <div id="oros-footer"></div>
  <script src="assets/js/components/footer.js"></script>

  <!-- Core (handles theme, language, zen, settings, BTT) -->
  <script src="assets/js/main.js"></script>
  <!-- Editor logic -->
  <script src="assets/js/editor.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
