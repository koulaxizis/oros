<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Text editor — offline, private, fast.">
  <title>Writer — orOS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">

  <script>
    (function(){
      var t = localStorage.getItem('oros-theme');
      if(!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <div id="oros-header"></div>
  <script src="assets/js/components/header.js"></script>

  <main class="app-main" id="editor-container">
    
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-group">
        <span class="stat-item"><span class="stat-value" id="word-count">0</span> words</span>
        <span class="stat-item"><span class="stat-value" id="char_count">0</span> chars</span>
        <span class="stat-item"><span class="stat-value" id="read_time">0m</span> read</span>
      </div>
      <span id="save-status" style="color:var(--accent);font-size:0.85rem;font-weight:600;"></span>
    </div>

    <!-- Find & Replace Bar (hidden by default) -->
    <div class="find-replace-bar" id="find-replace-bar" style="display:none;">
      <input type="text" class="find-input" id="find-find" placeholder="Find...">
      <input type="text" class="find-input" id="find-replace" placeholder="Replace with...">
      <div class="fr-buttons">
        <button class="fr-btn" id="btn-find-prev">Prev</button>
        <button class="fr-btn" id="btn-find-next">Next</button>
        <button class="fr-btn" id="btn-replace">Replace</button>
        <button class="fr-btn" id="btn-replace-all">All</button>
        <button class="close-fr-btn" id="btn-close-fr">×</button>
      </div>
      <span class="fr-results" id="fr-results">0 matches</span>
    </div>

    <div class="toolbar">
      <div class="export-wrap">
        <button id="btn-export" class="btn-control" data-i18n="button_export">Export &#9662;</button>
        <div class="export-dropdown" id="export-dropdown">
          <button data-format="md" data-i18n="export_md">Markdown</button>
          <button data-format="txt" data-i18n="export_txt">TXT</button>
          <button data-format="rtf" data-i18n="export_rtf">RTF</button>
          <button data-format="pdf" data-i18n="export_pdf">PDF</button>
          <button data-format="doc" data-i18n="export_doc">DOC</button>
        </div>
      </div>

      <button id="btn-open" class="btn-control" data-i18n="button_open" data-i18n-tooltip="open_hint">Open</button>
      <button id="btn-clear" class="btn-control" data-i18n="button_clear">Clear</button>

      <div class="mode-toggle">
        <button id="mode-md" class="active">MD</button>
        <button id="mode-rich">Rich</button>
      </div>
    </div>

    <div class="editor-wrapper" id="md-wrapper">
      <textarea
        id="editor"
        class="editor-input"
        data-i18n-placeholder="placeholder_editor"
        placeholder="Start writing here... Supports Markdown syntax."
        spellcheck="true"
      ></textarea>
    </div>

    <div class="editor-wrapper" id="rich-wrapper" style="display:none;">
      <div
        id="rich-editor"
        class="rich-editor"
        contenteditable="true"
        data-i18n-placeholder="placeholder_rich"
        data-placeholder="Start writing here..."
      ></div>
    </div>
  </main>

  <div id="oros-footer"></div>
  <script src="assets/js/components/footer.js"></script>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/editor.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
