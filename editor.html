<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>orOS Writer</title>
  <meta name="description" content="Privacy-first, offline writer for the modern creator.">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta name="theme-color" content="#1b1a18" data-dark="#1b1a18" data-light="#f6f5f1">
</head>
<body>

  <div id="oros-header"></div>

  <main class="app-main">
    <!-- FIND & REPLACE BAR -->
    <div class="find-replace-bar" id="find-replace-bar" style="display:none;">
      <input type="text" class="find-input" id="find-find" data-i18n-placeholder="placeholder_find" placeholder="Find...">
      <input type="text" class="find-input" id="find-replace" data-i18n-placeholder="placeholder_replace" placeholder="Replace with...">
      <div class="fr-buttons">
        <button class="fr-btn" id="btn-find-prev">↑</button>
        <button class="fr-btn" id="btn-find-next">↓</button>
        <button class="fr-btn" id="btn-replace" data-i18n="btn_replace">Replace</button>
        <button class="fr-btn" id="btn-replace-all" data-i18n="btn_replace_all">All</button>
      </div>
      <span class="fr-results" id="fr_results">0 matches</span>
      <button class="close-fr-btn" id="btn-close-fr">×</button>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <button class="btn-control" id="btn-open">📂 <span data-i18n="open">Open</span></button>
      <button class="btn-control" id="btn-clear">🗑 <span data-i18n="clear">Clear</span></button>
      <div class="quick-format-toolbar" id="quick-format-toolbar">
        <button class="fmt-btn" data-cmd="bold" data-i18n-tooltip="bold_title" title="Bold (Ctrl+B)">B</button>
        <button class="fmt-btn" data-cmd="italic" data-i18n-tooltip="italic_title" title="Italic (Ctrl+I)">I</button>
        <button class="fmt-btn" data-cmd="underline" data-i18n-tooltip="underline_title" title="Underline">U</button>
        <button class="fmt-btn" data-cmd="strikeThrough" data-i18n-tooltip="strike_title" title="Strikethrough">S</button>
        <span class="fmt-divider"></span>
        <button class="fmt-btn" data-block="H1" data-i18n-tooltip="h1_title" title="Heading 1">H1</button>
        <button class="fmt-btn" data-block="H2" data-i18n-tooltip="h2_title" title="Heading 2">H2</button>
        <button class="fmt-btn" data-block="H3" data-i18n-tooltip="h3_title" title="Heading 3">H3</button>
        <span class="fmt-divider"></span>
        <button class="fmt-btn" data-cmd="insertUnorderedList" data-i18n-tooltip="title_bullet_list" title="Bullet List">•</button>
        <button class="fmt-btn" data-cmd="insertOrderedList" data-i18n-tooltip="title_numbered_list" title="Numbered List">1.</button>
      </div>
      <span class="save-status" id="save_status" style="font-size:0.75rem;color:var(--text-secondary);margin-left:auto;"></span>
      <div class="export-wrap">
        <button class="btn-control" id="btn-export">⬇ <span data-i18n="export">Export</span></button>
        <div class="export-dropdown" id="export-dropdown">
          <button data-format="md" data-i18n="export_md">MD</button>
          <button data-format="txt" data-i18n="export_txt">TXT</button>
          <button data-format="rtf" data-i18n="export_rtf">RTF</button>
          <button data-format="doc" data-i18n="export_doc">DOC</button>
          <button data-format="pdf" data-i18n="export_pdf">PDF</button>
        </div>
      </div>
      <button class="btn-control btn-icon" id="btn-outline" data-i18n-tooltip="outline_title" title="Document Outline">📋</button>
    </div>

    <!-- EDITOR WRAPPER -->
    <div class="editor-wrapper" id="rich-wrapper">
      <div class="rich-editor" id="rich-editor" contenteditable="true" spellcheck="true"></div>
      <div class="stats-overlay" id="stats-overlay">
        <span id="word_count">0</span> <span data-i18n="text_words">words</span>
        <span class="stat-sep">|</span>
        <span id="char_count">0</span> <span data-i18n="text_chars">chars</span>
        <span class="stat-sep">|</span>
        <span id="read_time">1m</span>
      </div>
      <!-- DOCUMENT OUTLINE PANEL -->
      <div class="outline-panel" id="outline-panel" style="display:none;">
        <div class="outline-header">
          <span data-i18n="outline_title">Document Outline</span>
          <button class="close-outline-btn" id="btn-close-outline">×</button>
        </div>
        <div class="outline-list" id="outline-list"></div>
      </div>
    </div>
  </main>

  <div id="oros-footer"></div>

  <script src="assets/js/components/header.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/editor.js"></script>
  <script src="assets/js/components/footer.js"></script>
</body>
</html>
