<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Privacy-first creative toolkit for writers, musicians, photographers. No tracking, no ads, fully offline.">
  <meta name="author" content="Glarolykoi">
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>orOS — Artist's Operating System</title>
  <link rel="stylesheet" href="assets/css/style.css">
  
  <!-- Prevent theme FOUC -->
  <script>
    (function(){
      var t = localStorage.getItem('oros-theme');
      if(!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="./" class="logo" data-i18n="site_title">orOS</a>
      <div class="header-controls">
        <select id="language-select" class="lang-select" aria-label="Language selector"></select>
        <button id="theme-toggle" class="btn-control btn-icon" aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <main class="hero">
    <div class="container">
      <h1 class="hero-logo"><b>or</b><span>OS</span></h1>
      <p data-i18n="site_tagline">The artist's operating system</p>
    </div>
  </main>

  <section class="container">
    <p style="text-align:center;color:var(--text-secondary);" data-i18n="tools_intro">
      Select a tool below. All applications work offline and respect your personal data.
    </p>
    
    <div class="tools-grid">
      <a href="editor.html" class="tool-card">
        <div class="tool-icon">✏️</div>
        <div class="tool-name" data-i18n="editor_name">Writer</div>
        <div class="tool-desc" data-i18n="editor_desc">Simple markdown text editor with autosave</div>
      </a>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-text" data-i18n="footer_text">Open Source • No Tracking • No Ads • Privacy First</div>
      <div class="footer-credits" data-i18n="footer_credits">© 2026 Glarolykoi. Built with ♥ for artists.</div>
    </div>
  </footer>

  <button id="back-to-top" class="back-to-top" data-i18n="back_to_top">↑ Top</button>
  
  <script src="assets/js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
